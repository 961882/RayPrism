  facilitator_rules:
    opener_default: 让发言顺序中最早的活跃角色开场定调
    opener_override: 若用户显式指定某角色，则该角色先发言
    scenario_inference: 从话题启发词和活跃角色推断主场景，再选择反应对
    support_reaction_default: 主发言轮结束后，优先选择符合当前场景和模式的支持对
    challenge_reaction_default: 然后优先选择符合当前场景和模式的挑战对
    repetition_guardrail: 避免连续两轮重复相同的挑战对，除非分歧尚未解决
    close_default: 若需要综合角色，优先选择收尾优先级中最早的活跃角色

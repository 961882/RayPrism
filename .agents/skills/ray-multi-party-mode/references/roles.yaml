discussion_dynamics:
  default_turn_order:
    - pm
    - analyst
    - ux-designer
    - architect
    - security-engineer
    - dev
    - qa
    - data-analyst
    - growth-strategist
    - customer-success
    - operations-lead
    - sm
    - quick-flow-solo-dev
    - content-director
    - topic-strategist
    - content-planner
    - content-writer
    - visual-designer
    - content-reviewer
    - tech-writer

  closing_priority:
    - content-reviewer
    - tech-writer
    - pm
    - sm

  mode_profiles:
    roundtable:
      tone: 协作且均衡
      preferred_support_intensity:
        - low
        - medium
      preferred_challenge_intensity:
        - low
        - medium
      support_budget: 1
      challenge_budget: 1
    debate:
      tone: 直接且寻求对比
      preferred_support_intensity:
        - medium
      preferred_challenge_intensity:
        - medium
        - high
      support_budget: 1
      challenge_budget: 2
    critique:
      tone: 尖锐且审查导向
      preferred_support_intensity:
        - low
        - medium
      preferred_challenge_intensity:
        - medium
        - high
      support_budget: 1
      challenge_budget: 1
    planning:
      tone: 务实且交付导向
      preferred_support_intensity:
        - medium
      preferred_challenge_intensity:
        - low
        - medium
      support_budget: 1
      challenge_budget: 1
    decision:
      tone: 聚焦且收敛
      preferred_support_intensity:
        - medium
      preferred_challenge_intensity:
        - medium
        - high
      support_budget: 1
      challenge_budget: 1

  support_pairs:
    - source: pm
      target: analyst
      intensity: medium
      scenarios:
        - product
        - decision
        - strategy
      reason: 产品定义在证据跟进策略后更加精准
    - source: analyst
      target: ux-designer
      intensity: medium
      scenarios:
        - product
        - ux
        - customer
      reason: 用户痛点可视化后需求变得更具体
    - source: architect
      target: security-engineer
      intensity: medium
      scenarios:
        - architecture
        - security
        - platform
      reason: 风险边界提前明确能提升系统设计质量
    - source: dev
      target: quick-flow-solo-dev
      intensity: low
      scenarios:
        - fast-path
        - delivery
        - implementation
      reason: 实际实现方案能从快速路径替代中获益
    - source: qa
      target: operations-lead
      intensity: medium
      scenarios:
        - delivery
